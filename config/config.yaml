# config/config.yaml

llm:
  model: ${AIPRO_MODEL}
  temperature: 0.0
  max_tokens: 4096
  timeout: 60

embedding:
  model: ${AIPRO_EMBEDDING_MODEL}
  batch_size: 32
  dimension: 1536        # AI Pro 임베딩 실측 후 수정

vectordb:
  collections:
    github_code:
      name: dev_agent_github_code
      top_k: 5
    confluence_docs:
      name: dev_agent_confluence_docs
      top_k: 5
    cr_history:
      name: dev_agent_cr_history
      top_k: 3
  cache_ttl_seconds: 3600

rag:
  bm25_weight: 0.3       # 키워드 검색 가중치
  dense_weight: 0.7      # 벡터 검색 가중치
  reranker_top_k: 10     # Reranker 입력 후보 수
  final_top_k: 5         # 최종 반환 문서 수
  chunk_size_code: 1500  # 코드 청크 최대 문자 수
  chunk_size_doc: 1000   # 문서 청크 최대 문자 수
  chunk_overlap: 100     # 청크 오버랩 문자 수
  min_chunk_length: 50   # 최소 청크 길이 (미만 필터)

  # ── 인덱싱 범위 (대용량 소스 현실 제약 반영) ──
  cr_history_years: 3              # 두드림 CR 인덱싱 대상 기간 (최근 N년)
  cr_history_status: closed        # 인덱싱 대상 CR 상태 (완료 건만)
  stale_months: 12                 # 문서 신선도 임계 (초과 시 stale 표시·가중치 감점)
  github_include:                  # GitHub 선별 인덱싱 대상 (glob, repo-상대 경로)
    - "src/**"
    - "**/*.sql"
  github_exclude:                  # 인덱싱 제외 (생성물·vendor·테스트)
    - "**/test/**"
    - "**/tests/**"
    - "**/generated/**"
    - "**/build/**"
    - "**/dist/**"
    - "**/node_modules/**"
    - "**/vendor/**"
    - "**/*.min.js"
  confluence_curated_spaces: []    # 사전 인덱싱할 핵심 Space 키 목록 (그 외는 MCP 온디맨드)

agent:
  max_steps: 20          # 무한 루프 방지
  timeout_seconds: 120

gate:
  config_path: config/gate_rules.yaml

logging:
  level: INFO
  format: json
